repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/GitGuardian/ggshield
    rev: v1.43.0
    hooks:
        - id: ggshield
          name: ggshield secret scan (pre-commit)
          args: ["secret", "scan", "pre-commit", "--verbose"]
          stages: [pre-commit]
        - id: ggshield
          name: ggshield secret scan (pre-push)
          args: ["secret", "scan", "pre-push", "--verbose"]
          stages: [pre-push]

  # Semgrep - catches security issues similar to CodeQL (XSS, injection, etc.)
  - repo: https://github.com/semgrep/semgrep
    rev: v1.102.0
    hooks:
      - id: semgrep
        name: Semgrep security scan
        args:
          - --config=p/python
          - --config=p/django
          - --config=p/security-audit
          - --error
          - --quiet
        # Only run on changed Python files for speed
        types: [python]
        # Skip test files (less critical for security)
        exclude: ^tests/

  # Sync README version badge with pyproject.toml version on every version bump
  - repo: local
    hooks:
      - id: update-version-badge
        name: Update README version badge
        entry: python3
        language: system
        files: '^pyproject\.toml$'
        pass_filenames: false
        args:
          - -c
          - |
            import tomllib, re, subprocess
            with open('pyproject.toml', 'rb') as f:
                version = tomllib.load(f)['tool']['poetry']['version']
            with open('README.md', 'r') as f:
                content = f.read()
            new_content = re.sub(
                r'https://img\.shields\.io/badge/version-[^-]+-5fcfdd\?style=for-the-badge',
                f'https://img.shields.io/badge/version-{version}-5fcfdd?style=for-the-badge',
                content
            )
            if new_content != content:
                with open('README.md', 'w') as f:
                    f.write(new_content)
                subprocess.run(['git', 'add', 'README.md'])
                print(f'Updated README version badge to {version}')

  # Check for hardcoded passwords in Python test files (only in new commits)
  - repo: local
    hooks:
      - id: check-test-passwords
        name: Check for hardcoded passwords in tests
        entry: python3
        language: system
        files: 'test.*\.py$'
        args:
          - -c
          - |
            import sys, re
            pattern = re.compile(r'password\s*=\s*["\'][a-zA-Z0-9]{4,}["\']')
            for filepath in sys.argv[1:]:
                with open(filepath) as f:
                    content = f.read()
                    # Skip if file uses TEST_PASSWORD constant
                    if 'TEST_PASSWORD' in content:
                        continue
                    # Check for hardcoded passwords
                    matches = pattern.findall(content)
                    if matches:
                        print(f'❌ {filepath}: Found hardcoded password: {matches[0]}')
                        print('   Use TEST_PASSWORD = "x" constant instead.')
                        sys.exit(1)
            sys.exit(0)

  - repo: https://github.com/GitGuardian/ggshield
    rev: v1.43.0
    hooks:
      - id: ggshield
        name: ggshield secret scan (pre-commit)
        args: ["secret", "scan", "pre-commit", "--verbose"]
        stages: [pre-commit]
      - id: ggshield
        name: ggshield secret scan (pre-push)
        args: ["secret", "scan", "pre-push", "--verbose"]
        stages: [pre-push]

  # Dependency vulnerability scanning (runs on push only, can be slow)
  # Note: Use s/security-audit for local checks; CI runs pip-audit in GitHub Actions
  - repo: local
    hooks:
      - id: pip-audit
        name: Check for vulnerable dependencies
        entry: bash -c 'echo "Dependency scanning runs in CI (see .github/workflows/security.yml)" && echo "Run s/security-audit for local checks"'
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|poetry\.lock)$
        stages: [pre-push]
        always_run: false
