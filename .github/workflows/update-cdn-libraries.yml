name: Check CDN Library Updates

on:
  schedule:
    # Run weekly on Mondays at 9:30am UTC
    - cron: "30 9 * * 1"
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-libraries:
    runs-on: ubuntu-latest
    outputs:
      htmx_changed: ${{ steps.check-htmx.outputs.changed }}
      htmx_new_hash: ${{ steps.check-htmx.outputs.new_hash }}
      htmx_current_hash: ${{ steps.check-htmx.outputs.current_hash }}
      sortablejs_changed: ${{ steps.check-sortablejs.outputs.changed }}
      sortablejs_new_hash: ${{ steps.check-sortablejs.outputs.new_hash }}
      sortablejs_current_hash: ${{ steps.check-sortablejs.outputs.current_hash }}
      axecore_changed: ${{ steps.check-axecore.outputs.changed }}
      axecore_new_hash: ${{ steps.check-axecore.outputs.new_hash }}
      axecore_current_hash: ${{ steps.check-axecore.outputs.current_hash }}
      redoc_changed: ${{ steps.check-redoc.outputs.changed }}
      redoc_new_hash: ${{ steps.check-redoc.outputs.new_hash }}
      redoc_current_hash: ${{ steps.check-redoc.outputs.current_hash }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Load CDN manifest metadata
        id: cdn-metadata
        run: |
          manifest="checktick_app/cdn_assets.json"
          echo "htmx_version=$(jq -r '.assets[] | select(.key=="htmx") | .version' "$manifest")" >> $GITHUB_OUTPUT
          echo "sortablejs_version=$(jq -r '.assets[] | select(.key=="sortablejs") | .version' "$manifest")" >> $GITHUB_OUTPUT
          echo "axecore_version=$(jq -r '.assets[] | select(.key=="axe_core") | .version' "$manifest")" >> $GITHUB_OUTPUT
          echo "redoc_version=$(jq -r '.assets[] | select(.key=="redoc") | .version' "$manifest")" >> $GITHUB_OUTPUT

      - name: Check HTMX
        id: check-htmx
        run: |
          # Use npm as source of truth: download package tarball with `npm pack`, extract, find minified file
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          pushd "$tmpdir"
          npm pack htmx.org@${{ steps.cdn-metadata.outputs.htmx_version }} --silent
          tarball=$(ls *.tgz | head -n1)
          tar -xzf "$tarball"
          # Prefer dist/htmx.min.js, fall back to any *.min.js
          file=$(find package -type f -iname 'htmx*.min.js' -print -quit || true)
          if [ -z "$file" ]; then
            file=$(find package -type f -iname '*.min.js' -print -quit || true)
          fi
          if [ -z "$file" ]; then
            echo "No minified htmx file found in package" >&2
            exit 1
          fi
          src="$tmpdir/$file"

          # Calculate new hash
          NEW_HASH=$(openssl dgst -sha384 -binary "$src" | openssl base64 -A)
          echo "new_hash=${NEW_HASH}" >> $GITHUB_OUTPUT
          popd

          # Calculate current hash
          if [ -f checktick_app/static/js/htmx.min.js ]; then
            CURRENT_HASH=$(openssl dgst -sha384 -binary checktick_app/static/js/htmx.min.js | openssl base64 -A)
            echo "current_hash=${CURRENT_HASH}" >> $GITHUB_OUTPUT
          else
            echo "current_hash=" >> $GITHUB_OUTPUT
          fi

          # Compare hashes
          if [ "${NEW_HASH}" != "${CURRENT_HASH}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "HTMX has been updated or is missing"
            mv -f "$src" checktick_app/static/js/htmx.min.js
            tmp_json=$(mktemp)
            jq --arg key "htmx" --arg sri "sha384-${NEW_HASH}" '.assets |= map(if .key == $key then .sri = $sri else . end)' checktick_app/cdn_assets.json > "$tmp_json"
            mv "$tmp_json" checktick_app/cdn_assets.json
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "HTMX is up to date"
          fi

      - name: Check SortableJS
        id: check-sortablejs
        run: |
          # Use npm as source of truth: download package tarball with `npm pack`, extract, find minified file
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          pushd "$tmpdir"
          npm pack sortablejs@${{ steps.cdn-metadata.outputs.sortablejs_version }} --silent
          tarball=$(ls *.tgz | head -n1)
          tar -xzf "$tarball"
          # Try common names then fallback
          file=$(find package -type f \( -iname 'sortable*.min.js' -o -iname 'Sortable.min.js' -o -iname 'sortable.min.js' \) -print -quit || true)
          if [ -z "$file" ]; then
            file=$(find package -type f -iname '*.min.js' -print -quit || true)
          fi
          if [ -z "$file" ]; then
            echo "No minified SortableJS file found in package" >&2
            exit 1
          fi
          src="$tmpdir/$file"

          # Calculate new hash
          NEW_HASH=$(openssl dgst -sha384 -binary "$src" | openssl base64 -A)
          echo "new_hash=${NEW_HASH}" >> $GITHUB_OUTPUT
          popd

          # Calculate current hash
          if [ -f checktick_app/static/js/sortable.min.js ]; then
            CURRENT_HASH=$(openssl dgst -sha384 -binary checktick_app/static/js/sortable.min.js | openssl base64 -A)
            echo "current_hash=${CURRENT_HASH}" >> $GITHUB_OUTPUT
          else
            echo "current_hash=" >> $GITHUB_OUTPUT
          fi

          # Compare hashes
          if [ "${NEW_HASH}" != "${CURRENT_HASH}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "SortableJS has been updated or is missing"
            mv -f "$src" checktick_app/static/js/sortable.min.js
            tmp_json=$(mktemp)
            jq --arg key "sortablejs" --arg sri "sha384-${NEW_HASH}" '.assets |= map(if .key == $key then .sri = $sri else . end)' checktick_app/cdn_assets.json > "$tmp_json"
            mv "$tmp_json" checktick_app/cdn_assets.json
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "SortableJS is up to date"
          fi

      - name: Check axe-core
        id: check-axecore
        run: |
          # Use npm as source of truth: download package tarball with `npm pack`, extract, find minified file
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          pushd "$tmpdir"
          npm pack axe-core@${{ steps.cdn-metadata.outputs.axecore_version }} --silent
          tarball=$(ls *.tgz | head -n1)
          tar -xzf "$tarball"
          # Try common names then fallback
          file=$(find package -type f \( -iname 'axe*.min.js' -o -iname 'axe.min.js' \) -print -quit || true)
          if [ -z "$file" ]; then
            file=$(find package -type f -iname '*.min.js' -print -quit || true)
          fi
          if [ -z "$file" ]; then
            echo "No minified axe-core file found in package" >&2
            exit 1
          fi
          src="$tmpdir/$file"

          # Calculate new hash
          NEW_HASH=$(openssl dgst -sha384 -binary "$src" | openssl base64 -A)
          echo "new_hash=${NEW_HASH}" >> $GITHUB_OUTPUT
          popd

          # Calculate current hash
          if [ -f checktick_app/static/js/axe-core.min.js ]; then
            CURRENT_HASH=$(openssl dgst -sha384 -binary checktick_app/static/js/axe-core.min.js | openssl base64 -A)
            echo "current_hash=${CURRENT_HASH}" >> $GITHUB_OUTPUT
          else
            echo "current_hash=" >> $GITHUB_OUTPUT
          fi

          # Compare hashes
          if [ "${NEW_HASH}" != "${CURRENT_HASH}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "axe-core has been updated or is missing"
            mv -f "$src" checktick_app/static/js/axe-core.min.js
            tmp_json=$(mktemp)
            jq --arg key "axe_core" --arg sri "sha384-${NEW_HASH}" '.assets |= map(if .key == $key then .sri = $sri else . end)' checktick_app/cdn_assets.json > "$tmp_json"
            mv "$tmp_json" checktick_app/cdn_assets.json
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "axe-core is up to date"
          fi

      - name: Check ReDoc
        id: check-redoc
        run: |
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          pushd "$tmpdir"
          npm pack redoc@${{ steps.cdn-metadata.outputs.redoc_version }} --silent
          tarball=$(ls *.tgz | head -n1)
          tar -xzf "$tarball"
          file=$(find package/bundles -type f -name 'redoc.standalone.js' -print -quit || true)
          if [ -z "$file" ]; then
            echo "No redoc.standalone.js found in package" >&2
            exit 1
          fi
          src="$tmpdir/$file"

          NEW_HASH=$(openssl dgst -sha384 -binary "$src" | openssl base64 -A)
          echo "new_hash=${NEW_HASH}" >> $GITHUB_OUTPUT
          popd

          if [ -f checktick_app/static/js/redoc.standalone.min.js ]; then
            CURRENT_HASH=$(openssl dgst -sha384 -binary checktick_app/static/js/redoc.standalone.min.js | openssl base64 -A)
            echo "current_hash=${CURRENT_HASH}" >> $GITHUB_OUTPUT
          else
            echo "current_hash=" >> $GITHUB_OUTPUT
          fi

          if [ "${NEW_HASH}" != "${CURRENT_HASH}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "ReDoc has been updated or is missing"
            mv -f "$src" checktick_app/static/js/redoc.standalone.min.js
            tmp_json=$(mktemp)
            jq --arg key "redoc" --arg sri "sha384-${NEW_HASH}" '.assets |= map(if .key == $key then .sri = $sri else . end)' checktick_app/cdn_assets.json > "$tmp_json"
            mv "$tmp_json" checktick_app/cdn_assets.json
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ReDoc is up to date"
          fi

      - name: Check versions
        id: check-versions
        run: |
          echo "## Checking for newer library versions..." >> $GITHUB_STEP_SUMMARY

          # Check HTMX latest version from npm
          HTMX_LATEST=$(curl -s "https://registry.npmjs.org/htmx.org" | jq -r '.["dist-tags"].latest')
          echo "HTMX: Current pinned = ${{ steps.cdn-metadata.outputs.htmx_version }}, Latest = ${HTMX_LATEST}"
          echo "htmx_latest=${HTMX_LATEST}" >> $GITHUB_OUTPUT

          if [ "${{ steps.cdn-metadata.outputs.htmx_version }}" != "${HTMX_LATEST}" ]; then
            echo "- ⚠️ **HTMX**: Newer version available (${HTMX_LATEST} vs ${{ steps.cdn-metadata.outputs.htmx_version }})" >> $GITHUB_STEP_SUMMARY
            echo "htmx_update_available=true" >> $GITHUB_OUTPUT
          else
            echo "- ✅ **HTMX**: Up to date (${{ steps.cdn-metadata.outputs.htmx_version }})" >> $GITHUB_STEP_SUMMARY
            echo "htmx_update_available=false" >> $GITHUB_OUTPUT
          fi

          # Check SortableJS latest version from npm
          SORTABLEJS_LATEST=$(curl -s "https://registry.npmjs.org/sortablejs" | jq -r '.["dist-tags"].latest')
          echo "SortableJS: Current pinned = ${{ steps.cdn-metadata.outputs.sortablejs_version }}, Latest = ${SORTABLEJS_LATEST}"
          echo "sortablejs_latest=${SORTABLEJS_LATEST}" >> $GITHUB_OUTPUT

          if [ "${{ steps.cdn-metadata.outputs.sortablejs_version }}" != "${SORTABLEJS_LATEST}" ]; then
            echo "- ⚠️ **SortableJS**: Newer version available (${SORTABLEJS_LATEST} vs ${{ steps.cdn-metadata.outputs.sortablejs_version }})" >> $GITHUB_STEP_SUMMARY
            echo "sortablejs_update_available=true" >> $GITHUB_OUTPUT
          else
            echo "- ✅ **SortableJS**: Up to date (${{ steps.cdn-metadata.outputs.sortablejs_version }})" >> $GITHUB_STEP_SUMMARY
            echo "sortablejs_update_available=false" >> $GITHUB_OUTPUT
          fi

          # Check axe-core latest version from npm
          AXECORE_LATEST=$(curl -s "https://registry.npmjs.org/axe-core" | jq -r '.["dist-tags"].latest')
          echo "axe-core: Current pinned = ${{ steps.cdn-metadata.outputs.axecore_version }}, Latest = ${AXECORE_LATEST}"
          echo "axecore_latest=${AXECORE_LATEST}" >> $GITHUB_OUTPUT

          if [ "${{ steps.cdn-metadata.outputs.axecore_version }}" != "${AXECORE_LATEST}" ]; then
            echo "- ⚠️ **axe-core**: Newer version available (${AXECORE_LATEST} vs ${{ steps.cdn-metadata.outputs.axecore_version }})" >> $GITHUB_STEP_SUMMARY
            echo "axecore_update_available=true" >> $GITHUB_OUTPUT
          else
            echo "- ✅ **axe-core**: Up to date (${{ steps.cdn-metadata.outputs.axecore_version }})" >> $GITHUB_STEP_SUMMARY
            echo "axecore_update_available=false" >> $GITHUB_OUTPUT
          fi

          # Check ReDoc latest version from npm
          REDOC_LATEST=$(curl -s "https://registry.npmjs.org/redoc" | jq -r '.["dist-tags"].latest')
          echo "ReDoc: Current pinned = ${{ steps.cdn-metadata.outputs.redoc_version }}, Latest = ${REDOC_LATEST}"
          echo "redoc_latest=${REDOC_LATEST}" >> $GITHUB_OUTPUT

          if [ "${{ steps.cdn-metadata.outputs.redoc_version }}" != "${REDOC_LATEST}" ]; then
            echo "- ⚠️ **ReDoc**: Newer version available (${REDOC_LATEST} vs ${{ steps.cdn-metadata.outputs.redoc_version }})" >> $GITHUB_STEP_SUMMARY
            echo "redoc_update_available=true" >> $GITHUB_OUTPUT
          else
            echo "- ✅ **ReDoc**: Up to date (${{ steps.cdn-metadata.outputs.redoc_version }})" >> $GITHUB_STEP_SUMMARY
            echo "redoc_update_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync CDN docs
        if: steps.check-htmx.outputs.changed == 'true' ||
          steps.check-sortablejs.outputs.changed == 'true' ||
          steps.check-axecore.outputs.changed == 'true' ||
          steps.check-redoc.outputs.changed == 'true'
        run: |
          python3 s/sync-cdn-docs

      - name: Create Pull Request for hash changes
        id: create-pr
        if: steps.check-htmx.outputs.changed == 'true' ||
          steps.check-sortablejs.outputs.changed == 'true' ||
          steps.check-axecore.outputs.changed == 'true' ||
          steps.check-redoc.outputs.changed == 'true'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            Update CDN libraries with new SRI hashes

            Libraries updated:
            - HTMX ${{ steps.cdn-metadata.outputs.htmx_version }}: ${{ steps.check-htmx.outputs.changed == 'true' && 'Updated' || 'No change' }}
            - SortableJS ${{ steps.cdn-metadata.outputs.sortablejs_version }}: ${{ steps.check-sortablejs.outputs.changed == 'true' && 'Updated' || 'No change' }}
            - axe-core ${{ steps.cdn-metadata.outputs.axecore_version }}: ${{ steps.check-axecore.outputs.changed == 'true' && 'Updated' || 'No change' }}
            - ReDoc ${{ steps.cdn-metadata.outputs.redoc_version }}: ${{ steps.check-redoc.outputs.changed == 'true' && 'Updated' || 'No change' }}
          branch: update-cdn-libraries
          delete-branch: true
          title: "Update CDN libraries with new SRI hashes"
          body: |
            ## CDN Library Update

            One or more self-hosted CDN libraries have been refreshed from their sources.

            ### Changes

            | Library | Version | Status | New Hash |
            |---------|---------|--------|----------|
            | HTMX | ${{ steps.cdn-metadata.outputs.htmx_version }} | ${{ steps.check-htmx.outputs.changed == 'true' && '⚠️ Updated' || '✅ No change' }} | `${{ steps.check-htmx.outputs.new_hash }}` |
            | SortableJS | ${{ steps.cdn-metadata.outputs.sortablejs_version }} | ${{ steps.check-sortablejs.outputs.changed == 'true' && '⚠️ Updated' || '✅ No change' }} | `${{ steps.check-sortablejs.outputs.new_hash }}` |
            | axe-core | ${{ steps.cdn-metadata.outputs.axecore_version }} | ${{ steps.check-axecore.outputs.changed == 'true' && '⚠️ Updated' || '✅ No change' }} | `${{ steps.check-axecore.outputs.new_hash }}` |
            | ReDoc | ${{ steps.cdn-metadata.outputs.redoc_version }} | ${{ steps.check-redoc.outputs.changed == 'true' && '⚠️ Updated' || '✅ No change' }} | `${{ steps.check-redoc.outputs.new_hash }}` |

            ### Files Updated
            - `checktick_app/static/js/htmx.min.js`
            - `checktick_app/static/js/sortable.min.js`
            - `checktick_app/static/js/axe-core.min.js`
            - `checktick_app/static/js/redoc.standalone.min.js`
            - `checktick_app/cdn_assets.json`
            - `docs/cdn-libraries.md`

            ### Testing Checklist
            Before merging, please verify:
            - [ ] Survey form works correctly (HTMX)
            - [ ] Question reordering works (SortableJS)
            - [ ] Accessibility testing works (axe-core)
            - [ ] API documentation page renders (ReDoc)
            - [ ] No console errors or CSP violations
            - [ ] Build survey page functions correctly

            ### Integrity Hashes (Auto-Updated)
            The SRI hashes in `checktick_app/cdn_assets.json` (and generated docs) have been automatically updated:

            **HTMX**: `sha384-${{ steps.check-htmx.outputs.new_hash }}`
            **SortableJS**: `sha384-${{ steps.check-sortablejs.outputs.new_hash }}`
            **axe-core**: `sha384-${{ steps.check-axecore.outputs.new_hash }}`
            **ReDoc**: `sha384-${{ steps.check-redoc.outputs.new_hash }}`

      - name: Create per-dependency version issues
        if: steps.check-versions.outputs.htmx_update_available == 'true' ||
          steps.check-versions.outputs.sortablejs_update_available == 'true' ||
          steps.check-versions.outputs.axecore_update_available == 'true' ||
          steps.check-versions.outputs.redoc_update_available == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const deps = [];
            if (process.env.HTMX_UPDATE_AVAILABLE === 'true') {
              deps.push({
                name: 'HTMX',
                current: process.env.HTMX_CURRENT,
                latest: process.env.HTMX_LATEST,
                changelog: 'https://github.com/bigskysoftware/htmx/releases'
              });
            }
            if (process.env.SORTABLEJS_UPDATE_AVAILABLE === 'true') {
              deps.push({
                name: 'SortableJS',
                current: process.env.SORTABLEJS_CURRENT,
                latest: process.env.SORTABLEJS_LATEST,
                changelog: 'https://github.com/SortableJS/Sortable/releases'
              });
            }
            if (process.env.AXE_UPDATE_AVAILABLE === 'true') {
              deps.push({
                name: 'axe-core',
                current: process.env.AXE_CURRENT,
                latest: process.env.AXE_LATEST,
                changelog: 'https://github.com/dequelabs/axe-core/releases'
              });
            }
            if (process.env.REDOC_UPDATE_AVAILABLE === 'true') {
              deps.push({
                name: 'ReDoc',
                current: process.env.REDOC_CURRENT,
                latest: process.env.REDOC_LATEST,
                changelog: 'https://github.com/Redocly/redoc/releases'
              });
            }

            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            for (const d of deps) {
              const title = `${d.name} ${d.current} -> ${d.latest}: Dependency update`;
              const exists = openIssues.data.some(i => i.title === title);
              if (exists) {
                console.log(`Issue already exists for ${title}`);
                continue;
              }

              const body = `## ${d.name} Version Update\n\n` +
                `- **Current version:** ${d.current}\n` +
                `- **Latest version:** ${d.latest}\n\n` +
                `**Changelog:** ${d.changelog}\n\n` +
                `Please review the upgrade and update the version in checktick_app/cdn_assets.json, then run the workflow to refresh files and hashes.`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['dependencies', 'security']
              });
              console.log(`Created issue: ${title}`);
            }
        env:
          HTMX_UPDATE_AVAILABLE: ${{ steps.check-versions.outputs.htmx_update_available }}
          HTMX_CURRENT: ${{ steps.cdn-metadata.outputs.htmx_version }}
          HTMX_LATEST: ${{ steps.check-versions.outputs.htmx_latest }}
          SORTABLEJS_UPDATE_AVAILABLE: ${{ steps.check-versions.outputs.sortablejs_update_available }}
          SORTABLEJS_CURRENT: ${{ steps.cdn-metadata.outputs.sortablejs_version }}
          SORTABLEJS_LATEST: ${{ steps.check-versions.outputs.sortablejs_latest }}
          AXE_UPDATE_AVAILABLE: ${{ steps.check-versions.outputs.axecore_update_available }}
          AXE_CURRENT: ${{ steps.cdn-metadata.outputs.axecore_version }}
          AXE_LATEST: ${{ steps.check-versions.outputs.axecore_latest }}
          REDOC_UPDATE_AVAILABLE: ${{ steps.check-versions.outputs.redoc_update_available }}
          REDOC_CURRENT: ${{ steps.cdn-metadata.outputs.redoc_version }}
          REDOC_LATEST: ${{ steps.check-versions.outputs.redoc_latest }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
